<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#ffffff" />
		<title>Pictune — AI Image Editor</title>
		<!--
			Geist (Vercel) is the only typeface — minimal, neutral, designed
			for digital. Preconnect lets the browser open the TLS handshake
			to fonts.gstatic.com in parallel with the CSS request.
		-->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&display=swap"
			rel="stylesheet"
		/>
		<!--
			Cloudflare Turnstile. `?render=explicit` keeps the script from
			auto-rendering any `.cf-turnstile` divs on its own — our
			TurnstileProvider calls `turnstile.render()` explicitly so it
			can manage the widget id, token callbacks, and StrictMode-safe
			cleanup. async+defer keeps the script off the critical path.
		-->
		<script
			src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
			async
			defer
		></script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/client.tsx"></script>
	</body>
</html>
