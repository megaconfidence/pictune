<svg
	width="64"
	height="64"
	viewBox="0 0 64 64"
	xmlns="http://www.w3.org/2000/svg"
	role="img"
>
	<title>Pictune</title>
	<!--
		Ink rounded square — same near-black (#0A0A0A) and corner radius
		ratio (≈22%) as a typical macOS/iOS app tile, so the mark sits
		comfortably in a browser tab, a dock, or a home screen.
	-->
	<rect width="64" height="64" rx="14" fill="#0A0A0A" />

	<!--
		Lowercase 'p' — matches the in-app wordmark ("pictune •").
		The bowl is a clean circle, the stem a vertical bar whose right
		edge dissolves into the bowl. Together they read as a geometric
		'p' confident enough to survive at 16×16.
	-->
	<circle cx="34" cy="26" r="14" fill="#FFFFFF" />
	<rect x="18" y="13" width="9" height="40" rx="1.5" fill="#FFFFFF" />

	<!--
		Teal counter — the brand dot from "pictune •" promoted from
		punctuation to a structural part of the letter. The only color
		moment in the mark; same #0E7C66 used for every primary CTA.
	-->
	<circle cx="34" cy="26" r="6.5" fill="#0E7C66" />
</svg>
